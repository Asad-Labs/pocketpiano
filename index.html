<!DOCTYPE html>
<html lang="en">
<head>
      <!-- Cache Control -->
      <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
      <meta http-equiv="Pragma" content="no-cache">
      <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Web Piano</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-scaler">
        
    <div class="music-sheet-container collapsed" id="music-sheet-container">
        <div class="sheet-header">
            <select id="song-selector" class="song-selector">
                <option value="twinkle">Twinkle Twinkle Little Star</option>
                <option value="happy-birthday">Happy Birthday</option>
                <option value="c-major">C Major Scale</option>
                <option value="ode-to-joy">Ode to Joy</option>
                <option value="fur-elise">Für Elise (Intro)</option>
                <option value="jingle-bells">Jingle Bells</option>
                <option value="mary-lamb">Mary Had a Little Lamb</option>
                <option value="hot-cross-buns">Hot Cross Buns</option>
                <option value="let-it-go">Let It Go (Chorus)</option>
                <option value="hedwig-theme">Hedwig's Theme</option>
            </select>
            <button id="toggle-sheet-button" class="toggle-sheet-button">▼</button>
        </div>
        <div class="sheet-content">
            <div class="staff" id="staff">
                <!-- Staff lines will be generated by JS -->
                <div class="staff-line" style="top: 20px;"></div>
                <div class="staff-line" style="top: 35px;"></div>
                <div class="staff-line" style="top: 50px;"></div>
                <div class="staff-line" style="top: 65px;"></div>
                <div class="staff-line" style="top: 80px;"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label for="volume-slider">Volume</label>
            <input type="range" id="volume-slider" min="0" max="100" value="30">
        </div>
        <div class="control-group">
            <label for="reverb-toggle">Reverb</label>
            <label class="switch">
                <input type="checkbox" id="reverb-toggle" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="piano">
    <!-- White Keys (15 total, automatically stack side-by-side) -->
    <div class="key white-key" data-note="C4"><span class="key-label">C4</span></div>
    <div class="key white-key" data-note="D4"><span class="key-label">D4</span></div>
    <div class="key white-key" data-note="E4"><span class="key-label">E4</span></div>
    <div class="key white-key" data-note="F4"><span class="key-label">F4</span></div>
    <div class="key white-key" data-note="G4"><span class="key-label">G4</span></div>
    <div class="key white-key" data-note="A4"><span class="key-label">A4</span></div>
    <div class="key white-key" data-note="B4"><span class="key-label">B4</span></div>
    <div class="key white-key" data-note="C5"><span class="key-label">C5</span></div>
    <div class="key white-key" data-note="D5"><span class="key-label">D5</span></div>
    <div class="key white-key" data-note="E5"><span class="key-label">E5</span></div>
    <div class="key white-key" data-note="F5"><span class="key-label">F5</span></div>
    <div class="key white-key" data-note="G5"><span class="key-label">G5</span></div>
    <div class="key white-key" data-note="A5"><span class="key-label">A5</span></div>
    <div class="key white-key" data-note="B5"><span class="key-label">B5</span></div>
    <div class="key white-key" data-note="C6"><span class="key-label">C6</span></div>

    <!-- Black Keys (11 total, meticulously positioned) -->
    <!-- Octave 4 -->
    <div class="key black-key" data-note="C#4" style="left: 35px;"><span class="key-label">C#4</span></div>
    <div class="key black-key" data-note="D#4" style="left: 85px;"><span class="key-label">D#4</span></div>
    <!-- Skip between E and F -->
    <div class="key black-key" data-note="F#4" style="left: 188px;"><span class="key-label">F#4</span></div>
    <div class="key black-key" data-note="G#4" style="left: 239px;"><span class="key-label">G#4</span></div>
    <div class="key black-key" data-note="A#4" style="left: 290px;"><span class="key-label">A#4</span></div>
    <!-- Skip between B and C -->

    <!-- Octave 5 -->
    <div class="key black-key" data-note="C#5" style="left: 393px;"><span class="key-label">C#5</span></div>
    <div class="key black-key" data-note="D#5" style="left: 444px;"><span class="key-label">D#5</span></div>
    <!-- Skip between E and F -->
    <div class="key black-key" data-note="F#5" style="left: 547px;"><span class="key-label">F#5</span></div>
    <div class="key black-key" data-note="G#5" style="left: 599px;"><span class="key-label">G#5</span></div>
    <div class="key black-key" data-note="A#5" style="left: 650px;"><span class="key-label">A#5</span></div>
    <div class="key black-key" data-note="C#6" style="left: 753px;"><span class="key-label">C#6</span></div>
</div>


    <div class="instructions">
        Enjoy Piano on the go. Made with ❤️ by Asad!
    </div>
    </div>
<!-- Whenever you push a code change, update the version suffix: -->
<script src="script.js?v=1.0.1"></script>
</body>
</html>
